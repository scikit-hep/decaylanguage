ci:
  autoupdate_commit_msg: "chore: update pre-commit hooks"
  autofix_commit_msg: "style: pre-commit fixes"

repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: check-added-large-files
    args: ['--maxkb=1000']
  - id: mixed-line-ending
  - id: trailing-whitespace
  - id: check-merge-conflict
  - id: check-case-conflict
  - id: check-symlinks
  - id: check-yaml
  - id: debug-statements
  - id: end-of-file-fixer

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: "v0.15.18"
  hooks:
    - id: ruff-check
      args: ["--fix"]
    - id: ruff-format

- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v2.1.0
  hooks:
  - id: mypy
    files: '^src/decaylanguage/(decay|dec|utils)/'
    additional_dependencies: [particle, hepunits]

- repo: https://github.com/codespell-project/codespell
  rev: v2.4.2
  hooks:
  - id: codespell
    args: ["-L", "vertexes,unkown,te,HEP,hep"]
    exclude: '^(.*\.DEC|notebooks/ExampleDecFileParsingWithLark\.ipynb)$'

- repo: local
  hooks:
  - id: disallow-caps
    name: Disallow improper capitalization
    language: pygrep
    entry: PyBind|Numpy|Cmake|CCache|Github|PyTest
    exclude: .pre-commit-config.yaml
  - id: decaylanguage-validate
    name: Validate EvtGen decay files
    language: python
    entry: decaylanguage-validate
    additional_dependencies: [.]
    files: '^(src/decaylanguage/data/.*\.DEC|tests/data/.*\.dec)$'
    exclude: '^tests/data/(duplicate-decays|test_Xicc2XicPiPi|test_custom_decay_model|test_issue90)\.dec$'

- repo: https://github.com/pre-commit/pygrep-hooks
  rev: "v1.10.0"
  hooks:
  - id: rst-backticks
  - id: rst-directive-colons
  - id: rst-inline-touching-normal
